<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バス接近通知 - Bus KURU</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a1628;font-family:'Hiragino Sans','Noto Sans JP',sans-serif}
  input[type=range]{accent-color:#0ea5e9;width:100%}
  @keyframes busRide{0%{transform:translateX(-50px);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translateX(50px);opacity:0}}
  @keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  @keyframes urgent{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 0 14px rgba(239,68,68,0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const WORKER = "https://cold-recipe-799d.kikucchao.workers.dev";

function parseCSV(text) {
  if (!text) return [];
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const headers = lines[0].replace(/\r/g,"").split(",").map(h=>h.trim().replace(/^"|"$/g,""));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=[];let cur="",inQ=false;
    for(const c of line.replace(/\r/g,"")){
      if(c==='"'){inQ=!inQ;continue;}
      if(c===","&&!inQ){vals.push(cur.trim());cur="";continue;}
      cur+=c;
    }
    vals.push(cur.trim());
    const obj={};headers.forEach((h,i)=>{obj[h]=vals[i]??"";});
    return obj;
  });
}

function buildRoute(files,targetStopId){
  const stops=parseCSV(files["stops.txt"]);
  const stopTimes=parseCSV(files["stop_times.txt"]);
  const trips=parseCSV(files["trips.txt"]);
  const routes=parseCSV(files["routes.txt"]);
  const relevantTripIds=[...new Set(stopTimes.filter(st=>st.stop_id===targetStopId).map(st=>st.trip_id))];
  if(!relevantTripIds.length)return null;
  const tripId=relevantTripIds[0];
  const tripStops=stopTimes.filter(st=>st.trip_id===tripId).sort((a,b)=>+a.stop_sequence-+b.stop_sequence);
  const stopList=tripStops.map(ts=>{const s=stops.find(s=>s.stop_id===ts.stop_id);return{id:ts.stop_id,name:s?.stop_name??ts.stop_id};});
  const schedules=relevantTripIds.slice(0,50).map(tid=>{
    const first=stopTimes.filter(st=>st.trip_id===tid).sort((a,b)=>+a.stop_sequence-+b.stop_sequence)[0];
    return first?.departure_time??first?.arrival_time;
  }).filter(Boolean).sort();
  const routeId=trips.find(t=>t.trip_id===tripId)?.route_id;
  const routeName=routes.find(r=>r.route_id===routeId)?.route_long_name??routes.find(r=>r.route_id===routeId)?.route_short_name??"路線";
  return{routeName,stopList,schedules};
}

function parseTime(str){if(!str)return 0;const[h,m]=str.split(":").map(Number);return h*60+m;}
function formatTime(m){const h=Math.floor(m/60)%24;return`${String(h).padStart(2,"0")}:${String(Math.round(m%60)).padStart(2,"0")}`;}
function calcTimes(dep,count,interval){const base=parseTime(dep);return Array.from({length:count},(_,i)=>base+i*interval);}
function busPos(times,now){
  for(let i=0;i<times.length;i++){if(now<times[i]){const p=i===0?0:(now-times[i-1])/(times[i]-times[i-1]);return Math.max(0,i-1+Math.min(1,p));}}
  return times.length-1;
}
function saveConfig(cfg){try{localStorage.setItem("busapp_v4",JSON.stringify(cfg));}catch{}}
function loadConfig(){try{const s=localStorage.getItem("busapp_v4");return s?JSON.parse(s):null;}catch{return null;}}

function Pill({color="#38bdf8",children}){
  return <span style={{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:6,padding:"1px 7px",fontSize:11,fontWeight:600}}>{children}</span>;
}

function BusTimeline({stops,posFloat,targetIdx,notifyIdx}){
  return(
    <div style={{position:"relative",paddingLeft:12}}>
      <div style={{position:"absolute",left:20,top:8,bottom:8,width:2,background:"#1e293b",borderRadius:2}}/>
      {posFloat>=0&&<div style={{position:"absolute",left:20,top:8,height:`${(Math.min(posFloat,stops.length-1)/(stops.length-1))*100}%`,width:2,background:"linear-gradient(to bottom,#22c55e,#38bdf8)",borderRadius:2,transition:"height 0.8s ease"}}/>}
      {stops.map((stop,i)=>{
        const passed=i<posFloat-0.3,isTarget=i===targetIdx,isNotify=i===notifyIdx,isBus=Math.abs(i-posFloat)<0.7;
        const col=isBus?"#facc15":isTarget?"#38bdf8":isNotify?"#a78bfa":passed?"#22c55e":"#1e3a5f";
        return(
          <div key={i} style={{display:"flex",alignItems:"center",marginBottom:i<stops.length-1?11:0,opacity:passed&&!isTarget&&!isNotify?0.3:1,transition:"opacity 0.3s"}}>
            <div style={{width:16,height:16,borderRadius:"50%",background:col,border:"3px solid #0a1628",flexShrink:0,zIndex:1,boxShadow:isBus||isTarget?`0 0 12px ${col}`:"none",transition:"all 0.3s"}}/>
            <div style={{marginLeft:14,fontSize:isTarget?15:13,fontWeight:isTarget||isBus?700:400,color:isBus?"#facc15":isTarget?"#38bdf8":isNotify?"#a78bfa":passed?"#334155":"#94a3b8",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              {stop.name}
              {isTarget&&<Pill color="#38bdf8">乗車</Pill>}
              {isNotify&&!isTarget&&<Pill color="#a78bfa">通知</Pill>}
              {isBus&&<span>🚌</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function App(){
  const[screen,setScreen]=useState("welcome");
  const[route,setRoute]=useState(null);
  const[targetIdx,setTargetIdx]=useState(0);
  const[cachedFiles,setCachedFiles]=useState(null);
  const[allStops,setAllStops]=useState([]);
  const[stopFilter,setStopFilter]=useState("");
  const[searchQuery,setSearchQuery]=useState("");
  const[searchResults,setSearchResults]=useState([]);
  const[loadMsg,setLoadMsg]=useState("");
  const[loadError,setLoadError]=useState("");
  const[notifyMode,setNotifyMode]=useState("stops");
  const[notifyStops,setNotifyStops]=useState(2);
  const[notifyMins,setNotifyMins]=useState(5);
  const[banner,setBanner]=useState(null);
  const[notifiedIds,setNotifiedIds]=useState(new Set());
  const[nowMin,setNowMin]=useState(()=>{const n=new Date();return n.getHours()*60+n.getMinutes();});
  const[simMode,setSimMode]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const simRef=useRef(null);

  useEffect(()=>{
    const cfg=loadConfig();
    if(cfg?.route&&cfg?.targetIdx!==undefined){
      setRoute(cfg.route);setTargetIdx(cfg.targetIdx);
      setNotifyMode(cfg.notifyMode??"stops");setNotifyStops(cfg.notifyStops??2);setNotifyMins(cfg.notifyMins??5);
      setScreen("monitor");
    }
  },[]);

  useEffect(()=>{
    if(simMode){simRef.current=setInterval(()=>setNowMin(m=>m+0.5),500);}
    else{
      clearInterval(simRef.current);
      const t=setInterval(()=>{const n=new Date();setNowMin(n.getHours()*60+n.getMinutes());},15000);
      return()=>clearInterval(t);
    }
    return()=>clearInterval(simRef.current);
  },[simMode]);

  const getBuses=useCallback(()=>{
    if(!route)return[];
    const iv=route.intervalMinutes??3.5;
    return route.schedules.map((dep,i)=>{
      const times=calcTimes(dep,route.stops.length,iv);
      return{id:`b${i}`,times,posFloat:busPos(times,nowMin),minsToTarget:times[targetIdx]-nowMin,depMin:parseTime(dep)};
    }).filter(b=>nowMin>=b.depMin&&b.times[targetIdx]>=nowMin-1);
  },[route,targetIdx,nowMin]);

  const buses=getBuses();
  const nextBus=buses.find(b=>b.minsToTarget>0);

  useEffect(()=>{
    if(screen!=="monitor"||!route)return;
    buses.forEach(bus=>{
      if(notifiedIds.has(bus.id))return;
      let fire=false,msg="";
      if(notifyMode==="stops"){
        const at=targetIdx-notifyStops;
        if(at>=0&&bus.posFloat>=at&&bus.posFloat<at+1.2){fire=true;msg=`バスが${notifyStops}つ前「${route.stops[at]?.name}」に来ました！準備して 🏃`;}
      }else{
        if(bus.minsToTarget<=notifyMins&&bus.minsToTarget>0){fire=true;msg=`バスがあと約${Math.ceil(bus.minsToTarget)}分で来ます！準備して 🏃`;}
      }
      if(fire){
        setBanner(msg);setNotifiedIds(p=>new Set([...p,bus.id]));
        if("Notification"in window&&Notification.permission==="granted")new Notification("🚌 バスが来ます！",{body:msg});
      }
    });
  },[nowMin,screen]);

  async function handleSearch(){
    if(!searchQuery.trim())return;
    setLoadError("");setSearchResults([]);setLoadMsg("検索しています…");
    try{
      const res=await fetch(`${WORKER}/?action=search&q=${encodeURIComponent(searchQuery)}`);
      const data=await res.json();
      if(data.error)throw new Error(data.error);
      setSearchResults(data.results??[]);
      setLoadMsg(data.results?.length?"":"見つかりませんでした。別のキーワードを試してください。");
    }catch(e){setLoadError(e.message);setLoadMsg("");}
  }

  async function handleSelectCompany(company){
    setLoadError("");setSearchResults([]);setLoadMsg("最新の時刻表を探しています…");
    try{
      let gtfsUrl=null;
      if(company.source==="known"){
        const res=await fetch(`${WORKER}/?action=find_zip&id=${company.id}`);
        const data=await res.json();
        if(data.error)throw new Error(data.error);
        gtfsUrl=data.latestUrl;
      }else if(company.gtfsUrl){gtfsUrl=company.gtfsUrl;}
      if(!gtfsUrl)throw new Error("時刻表データのURLが見つかりませんでした");
      setLoadMsg("時刻表データを読み込んでいます…（少し時間がかかります）");
      const res2=await fetch(`${WORKER}/?action=fetch_gtfs&url=${encodeURIComponent(gtfsUrl)}`);
      const data2=await res2.json();
      if(data2.error)throw new Error(data2.error);
      setCachedFiles(data2.files);setAllStops(parseCSV(data2.files["stops.txt"]));
      setStopFilter("");setLoadMsg("");setScreen("stop_select");
    }catch(e){setLoadError(e.message);setLoadMsg("");}
  }

  function handleSelectStop(stopId){
    const result=buildRoute(cachedFiles,stopId);
    if(!result){setLoadError("この停留所を含む便が見つかりませんでした");return;}
    const newStops=result.stopList.map(s=>({id:s.id,name:s.name}));
    const newTargetIdx=result.stopList.findIndex(s=>s.id===stopId);
    const newRoute={name:result.routeName,stops:newStops,schedules:result.schedules,intervalMinutes:3};
    const newTarget=newTargetIdx>=0?newTargetIdx:newStops.length-1;
    setRoute(newRoute);setTargetIdx(newTarget);setNotifiedIds(new Set());
    saveConfig({route:newRoute,targetIdx:newTarget,notifyMode,notifyStops,notifyMins});
    setScreen("monitor");
  }

  const notifyAtIdx=notifyMode==="stops"?Math.max(0,targetIdx-notifyStops):null;
  const filtered=stopFilter?allStops.filter(s=>s.stop_name?.includes(stopFilter)||s.stop_id?.includes(stopFilter)):allStops;
  const base={minHeight:"100vh",background:"#0a1628",color:"#e2e8f0",fontFamily:"'Hiragino Sans','Noto Sans JP',sans-serif",maxWidth:430,margin:"0 auto"};

  // ウェルカム画面
  if(screen==="welcome"){
    return(
      <div style={base}>
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 20px"}}>
          {loadMsg&&!loadError?(
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:48,animation:"busRide 2s ease-in-out infinite",marginBottom:24}}>🚌</div>
              <div style={{fontSize:16,fontWeight:700,marginBottom:8,color:"#e2e8f0"}}>{loadMsg}</div>
              <button onClick={()=>{setLoadMsg("");setLoadError("");}} style={{marginTop:16,background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"10px 20px",color:"#64748b",fontSize:13,cursor:"pointer"}}>キャンセル</button>
            </div>
          ):(
            <div style={{width:"100%",maxWidth:380,animation:"fadeUp 0.4s ease"}}>
              <div style={{textAlign:"center",marginBottom:32}}>
                <div style={{fontSize:52,marginBottom:12,animation:"float 2.5s ease-in-out infinite"}}>🚌</div>
                <div style={{fontSize:22,fontWeight:800,marginBottom:8,color:"#e2e8f0"}}>バス接近通知</div>
                <div style={{fontSize:13,color:"#475569",lineHeight:1.8}}>バス会社名を入力するだけで<br/>最新の時刻表を自動で取得します</div>
              </div>
              <div style={{display:"flex",gap:8,marginBottom:14}}>
                <input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&handleSearch()}
                  placeholder="バス会社名（例：十勝バス）"
                  style={{flex:1,background:"#1e293b",border:"1px solid #334155",borderRadius:12,padding:"13px 16px",color:"#e2e8f0",fontSize:15,fontFamily:"inherit",outline:"none"}}
                />
                <button onClick={handleSearch} style={{padding:"13px 18px",background:"#0ea5e9",border:"none",borderRadius:12,color:"white",fontWeight:700,fontSize:15,cursor:"pointer",flexShrink:0}}>検索</button>
              </div>
              {loadError&&<div style={{background:"#450a0a",border:"1px solid #7f1d1d",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#f87171"}}>{loadError}</div>}
              {searchResults.length>0&&(
                <div style={{background:"#1e293b",borderRadius:14,border:"1px solid #334155",overflow:"hidden",marginBottom:14}}>
                  <div style={{fontSize:11,color:"#475569",padding:"10px 16px 6px"}}>検索結果 {searchResults.length}件</div>
                  {searchResults.map((co,i)=>(
                    <div key={i} onClick={()=>handleSelectCompany(co)}
                      style={{padding:"14px 16px",borderTop:"1px solid #1e3a5f",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:36,height:36,borderRadius:10,background:"#0ea5e922",border:"1px solid #0ea5e944",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🚌</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:15,fontWeight:600,color:"#e2e8f0"}}>{co.name}</div>
                        <div style={{fontSize:11,color:"#475569",marginTop:2}}>{co.source==="known"?"自社HP公開":"国交省データ"}</div>
                      </div>
                      <div style={{color:"#334155",fontSize:20}}>›</div>
                    </div>
                  ))}
                </div>
              )}
              {loadMsg&&<div style={{textAlign:"center",color:"#475569",fontSize:13,marginBottom:8}}>{loadMsg}</div>}
              <div style={{textAlign:"center"}}>
                <button onClick={()=>setScreen("manual")} style={{background:"none",border:"none",color:"#334155",fontSize:13,cursor:"pointer",textDecoration:"underline"}}>時刻表を手動で入力する</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // 停留所選択画面
  if(screen==="stop_select"){
    return(
      <div style={base}>
        <div style={{background:"linear-gradient(135deg,#0ea5e9,#6366f1)",padding:"28px 20px 20px"}}>
          <button onClick={()=>setScreen("welcome")} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,color:"white",padding:"6px 12px",fontSize:13,cursor:"pointer",marginBottom:14}}>← 戻る</button>
          <div style={{fontSize:20,fontWeight:800,marginBottom:6,color:"white"}}>乗る停留所を選んでください</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.7)"}}>一度設定すれば次回から自動で起動します</div>
        </div>
        <div style={{padding:14}}>
          <div style={{background:"#1e293b",borderRadius:12,padding:12,marginBottom:14,border:"1px solid #334155"}}>
            <input type="text" value={stopFilter} onChange={e=>setStopFilter(e.target.value)}
              placeholder="🔍 停留所名で絞り込み…"
              style={{width:"100%",background:"#0a1628",border:"1px solid #334155",borderRadius:8,padding:"10px 14px",color:"#e2e8f0",fontSize:15,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}
            />
          </div>
          {loadError&&<div style={{background:"#450a0a",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#f87171"}}>{loadError}</div>}
          <div style={{background:"#1e293b",borderRadius:14,border:"1px solid #334155",overflow:"hidden"}}>
            {filtered.slice(0,200).map((s,i)=>(
              <div key={s.stop_id} onClick={()=>handleSelectStop(s.stop_id)}
                style={{padding:"13px 16px",borderBottom:i<filtered.length-1?"1px solid #1e3a5f":"none",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:"#0ea5e922",border:"1px solid #0ea5e933",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>🚏</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,color:"#e2e8f0"}}>{s.stop_name}</div>
                  <div style={{fontSize:11,color:"#334155",marginTop:2}}>{s.stop_id}</div>
                </div>
                <div style={{color:"#334155",fontSize:20}}>›</div>
              </div>
            ))}
            {filtered.length===0&&<div style={{padding:20,textAlign:"center",color:"#475569",fontSize:13}}>該当する停留所がありません</div>}
          </div>
          <div style={{fontSize:11,color:"#1e3a5f",textAlign:"center",marginTop:10}}>{filtered.length>200?`上位200件表示（全${filtered.length}件）`:`${filtered.length}件`}</div>
        </div>
      </div>
    );
  }

  // 手動入力画面
  if(screen==="manual"){
    const[mName,setMName]=useState("");
    const[mStops,setMStops]=useState("");
    const[mTimes,setMTimes]=useState("");
    const[mInterval,setMInterval]=useState("3");
    const apply=()=>{
      const stops=mStops.split("\n").map(s=>s.trim()).filter(Boolean).map((name,i)=>({id:`m${i}`,name}));
      const schedules=mTimes.split("\n").map(s=>s.trim()).filter(s=>/^\d{1,2}:\d{2}$/.test(s));
      if(stops.length<2){alert("停留所を2つ以上入力してください");return;}
      if(!schedules.length){alert("時刻表を入力してください（例: 08:00）");return;}
      const newRoute={name:mName||"手動入力路線",stops,schedules,intervalMinutes:parseFloat(mInterval)||3};
      const newTarget=stops.length-1;
      setRoute(newRoute);setTargetIdx(newTarget);setNotifiedIds(new Set());
      saveConfig({route:newRoute,targetIdx:newTarget,notifyMode,notifyStops,notifyMins});
      setScreen("monitor");
    };
    const inp={width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"10px 12px",color:"#e2e8f0",fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box",marginBottom:14};
    return(
      <div style={base}>
        <div style={{padding:16}}>
          <button onClick={()=>setScreen("welcome")} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,color:"#64748b",padding:"6px 12px",fontSize:13,cursor:"pointer",marginBottom:16}}>← 戻る</button>
          <div style={{fontSize:17,fontWeight:700,marginBottom:16,color:"#e2e8f0"}}>✏️ 手動で時刻表を入力</div>
          <div style={{fontSize:12,color:"#64748b",marginBottom:4}}>路線名</div>
          <input type="text" value={mName} onChange={e=>setMName(e.target.value)} placeholder="例: ○○バス 駅前循環線" style={inp}/>
          <div style={{fontSize:12,color:"#64748b",marginBottom:4}}>停留所（1行に1つ、始発から順に）</div>
          <textarea rows={5} value={mStops} onChange={e=>setMStops(e.target.value)} placeholder={"中央駅前\n市役所前\n図書館通り\nあなたの停留所"} style={{...inp,resize:"vertical"}}/>
          <div style={{fontSize:12,color:"#64748b",marginBottom:4}}>出発時刻（1行に1つ）</div>
          <textarea rows={5} value={mTimes} onChange={e=>setMTimes(e.target.value)} placeholder={"08:00\n08:20\n08:40\n09:00"} style={{...inp,resize:"vertical"}}/>
          <div style={{fontSize:12,color:"#64748b",marginBottom:4}}>停留所間の平均時間（分）</div>
          <input type="text" value={mInterval} onChange={e=>setMInterval(e.target.value)} placeholder="3" style={inp}/>
          <button onClick={apply} style={{width:"100%",padding:"14px 0",background:"li
