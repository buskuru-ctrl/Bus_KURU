<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バスクル - バス接近通知アプリ</title>
    <!-- Tailwind CSS (UIを整えるためのデザインシート) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts (丸みのある可愛いフォント) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;700&family=Yusei+Magic&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kiwi Maru', serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
        }
        .pop-title {
            font-family: 'Yusei Magic', sans-serif;
        }
        /* バスのアニメーション */
        @keyframes bus-move {
            0% { transform: translateX(-100%) translateY(0); }
            50% { transform: translateX(50vw) translateY(-4px); }
            100% { transform: translateX(120vw) translateY(0); }
        }
        .animate-bus {
            animation: bus-move 12s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 pb-12">

    <!-- ヘッダーと可愛いアニメーション背景 -->
    <header class="bg-amber-400 text-white p-4 shadow-md relative overflow-hidden">
        <div class="max-w-md mx-auto flex items-center justify-between relative z-10">
            <h1 class="text-2xl font-bold pop-title tracking-wider flex items-center gap-2">
                🚌 バスクル
            </h1>
            <span class="text-xs bg-amber-500 px-2 py-1 rounded-full font-bold">学生さん大歓迎☆</span>
        </div>
        <!-- 画面の後ろをトコトコ走る可愛いバスのアニメーション -->
        <div class="absolute bottom-0 left-0 w-full overflow-hidden whitespace-nowrap pointer-events-none opacity-40">
            <span class="inline-block animate-bus text-3xl">🚌💨 ━━🚏━━</span>
        </div>
    </header>

    <main class="max-w-md mx-auto mt-6 px-4">
        <!-- アプリの案内パネル -->
        <div class="bg-white rounded-2xl p-5 shadow-sm border-2 border-amber-200 mb-6 relative overflow-hidden">
            <div class="absolute -right-4 -bottom-4 text-6xl opacity-10 pointer-events-none">🏫</div>
            <h2 class="text-base font-bold text-amber-600 mb-2">学校や塾へ行くみんなを応援！</h2>
            <p class="text-xs text-slate-500 leading-relaxed">
                おうちや学校で待っている間に、バスが近づいたらスマホにお知らせします。雨の日や寒い日も、これでもう乗り遅れないよ！
            </p>
        </div>

        <!-- メインの操作カード -->
        <div class="bg-white rounded-2xl p-6 shadow-md border border-slate-100 space-y-6">
            
            <!-- STEP1: バス会社の検索 -->
            <div class="space-y-2">
                <label class="block text-sm font-bold text-slate-700 flex items-center gap-1">
                    <span class="bg-amber-400 text-white rounded-full w-5 h-5 inline-flex items-center justify-center text-xs">1</span>
                    バス会社をさがす
                </label>
                <div class="flex gap-2">
                    <input type="text" id="search-input" placeholder="例: 十勝バス、東京" class="flex-1 border-2 border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-amber-400 transition-colors">
                    <button id="search-btn" class="bg-amber-400 hover:bg-amber-500 text-white font-bold px-4 py-2 rounded-xl text-sm transition-colors shadow-sm">けんさく</button>
                </div>
                <div id="search-results" class="space-y-2 max-h-40 overflow-y-auto pt-1"></div>
            </div>

            <!-- STEP2: バス停の指定（文字入力バグを修正） -->
            <div class="space-y-2">
                <label class="block text-sm font-bold text-slate-700 flex items-center gap-1">
                    <span class="bg-amber-400 text-white rounded-full w-5 h-5 inline-flex items-center justify-center text-xs">2</span>
                    のるバス停をいれる
                </label>
                <input type="text" id="stop-input" placeholder="例: 西2条1丁目" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-amber-400 transition-colors">
                <div id="stop-results" class="space-y-1 max-h-40 overflow-y-auto pt-1"></div>
            </div>

            <!-- STEP3: 通知の設定 -->
            <div class="space-y-4 pt-2 border-t border-dashed border-slate-100">
                <label class="block text-sm font-bold text-slate-700 flex items-center gap-1">
                    <span class="bg-amber-400 text-white rounded-full w-5 h-5 inline-flex items-center justify-center text-xs">3</span>
                    何分前にしらせる？
                </label>
                
                <div class="bg-amber-50 p-4 rounded-xl border border-amber-100">
                    <div class="flex justify-between text-xs font-bold text-amber-700 mb-1">
                        <span>じっくり準備</span>
                        <span>すぐ出発！</span>
                    </div>
                    <input type="range" id="time-range" min="1" max="15" value="5" class="w-full accent-amber-500">
                    <div class="text-center mt-2 font-bold text-lg text-slate-700">
                        バスが来る <span id="time-val" class="text-2xl text-amber-500">5</span> 分前にお知らせ
                    </div>
                </div>

                <button id="notify-btn" class="w-full bg-emerald-400 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition-all shadow-md hover:shadow-lg transform active:scale-[0.98]">
                    🔔 この設定で通知をスタート！
                </button>
            </div>

        </div>

        <!-- 状態表示エリア -->
        <div id="status-card" class="mt-4 bg-slate-50 border border-slate-200 rounded-xl p-4 text-xs text-slate-500 hidden">
            <h4 class="font-bold text-slate-700 mb-1 flex items-center gap-1">
                <span class="inline-block w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                現在のチェック状況
            </h4>
            <p id="status-text">バスの現在地を確認しています...</p>
        </div>
    </main>

    <!-- 各種処理を行うJavaScriptプログラム -->
    <script>
        // 設定情報の記憶場所
        const CONFIG = {
            API_URL: "https://bus-proxy.kikucchao-ctrl.workers.dev" // Cloudflare WorkersのURL
        };

        let currentCompany = null;
        let allStops = [];
        let selectedStop = null;

        // 画面の部品たち
        const searchInput = document.getElementById("search-input");
        const searchBtn = document.getElementById("search-btn");
        const searchResults = document.getElementById("search-results");
        const stopInput = document.getElementById("stop-input");
        const stopResults = document.getElementById("stop-results");
        const timeRange = document.getElementById("time-range");
        const timeVal = document.getElementById("time-val");
        const notifyBtn = document.getElementById("notify-btn");
        const statusCard = document.getElementById("status-card");
        const statusText = document.getElementById("status-text");

        // スライダーを動かしたとき
        timeRange.addEventListener("input", (e) => {
            timeVal.textContent = e.target.value;
        });

        // バス会社の検索ボタンを押したとき
        searchBtn.addEventListener("click", async () => {
            const q = searchInput.value.trim();
            if(!q){ alert("探したいバス会社名を入力してね！"); return; }
            searchResults.innerHTML = `<div class="text-xs text-slate-400 animate-pulse">いっしょうけんめい探しています...</div>`;
            
            try {
                const res = await fetch(`${CONFIG.API_URL}/?action=search&q=${encodeURIComponent(q)}`);
                const data = await res.json();
                searchResults.innerHTML = "";

                if(!data.results || data.results.length === 0){
                    searchResults.innerHTML = `<div class="text-xs text-rose-400 font-bold p-2 bg-rose-50 rounded-xl">見つかりませんでした。別の言葉で試してね。</div>`;
                    return;
                }

                data.results.forEach(co => {
                    const div = document.createElement("div");
                    div.className = "flex items-center justify-between p-3 bg-slate-50 hover:bg-amber-50 rounded-xl cursor-pointer border border-slate-100 transition-colors";
                    
                    // 「GPS対応」から「リアルタイム情報対応」へ文字変更
                    const badge = co.hasRealtime 
                        ? `<span class="text-[10px] bg-emerald-100 text-emerald-700 font-bold px-2 py-0.5 rounded-full">✨ リアルタイム情報対応</span>`
                        : `<span class="text-[10px] bg-orange-100 text-orange-700 font-bold px-2 py-0.5 rounded-full">🕒 時刻表のみ対応</span>`;
                    
                    div.innerHTML = `
                        <div class="font-bold text-xs text-slate-700">${co.name}</div>
                        ${badge}
                    `;
                    div.addEventListener("click", () => selectCompany(co));
                    searchResults.appendChild(div);
                });
            } catch(e) {
                searchResults.innerHTML = `<div class="text-xs text-rose-400 font-bold">通信エラーが起きました。少し待って試してね。</div>`;
            }
        });

        // バス会社を選択したときの処理
        async function selectCompany(co) {
            currentCompany = co;
            searchResults.innerHTML = `
                <div class="p-3 bg-amber-100 text-amber-800 font-bold rounded-xl text-xs flex items-center justify-between border border-amber-200">
                    <span>📍 選択中: ${co.name}</span>
                    <button onclick="location.reload()" class="text-[10px] bg-white text-slate-600 px-2 py-0.5 rounded-md shadow-sm">えらび直す</button>
                </div>
            `;
            stopResults.innerHTML = `<div class="text-xs text-slate-400 animate-pulse">バス停のリストをあつめています...</div>`;
            
            try {
                let zipUrl = co.gtfsUrl;
                if(co.source === "known"){
                    const zr = await fetch(`${CONFIG.API_URL}/?action=find_zip&id=${co.id}`);
                    const zd = await zr.json();
                    zipUrl = zd.latestUrl;
                }
                if(!zipUrl){ throw new Error("データURLが見つかりません"); }

                const sr = await fetch(`${CONFIG.API_URL}/?action=fetch_stops&url=${encodeURIComponent(zipUrl)}`);
                const sd = await sr.json();
                
                if(sd.success && sd.files["stops.txt"]){
                    parseStops(sd.files["stops.txt"]);
                    stopResults.innerHTML = `<div class="text-xs text-emerald-600 font-bold p-2 bg-emerald-50 rounded-xl">準備完了！下の欄にバス停の名前をいれてね。</div>`;
                } else {
                    stopResults.innerHTML = `<div class="text-xs text-rose-400">バス停が読み込めませんでした。</div>`;
                }
            } catch(e) {
                stopResults.innerHTML = `<div class="text-xs text-rose-400">エラー: バス停の取得に失敗しました。</div>`;
            }
        }

        // バス停のテキストデータを分解する処理
        function parseStops(csvText) {
            const lines = csvText.split("\n");
            const hdr = lines[0].replace(/\r/g,"").split(",");
            const ni = hdr.indexOf("stop_name");
            const id = hdr.indexOf("stop_id");
            
            allStops = [];
            for(let i=1; i<lines.length; i++){
                const l = lines[i].replace(/\r/g,"");
                if(!l.trim()) continue;
                const p = l.split(",");
                const name = (p[ni]||"").trim().replace(/^"|"$/g,"");
                const stopId = (p[id]||"").trim().replace(/^"|"$/g,"");
                if(name) allStops.push({id: stopId, name: name});
            }
        }

        // ★文字入力バグの修正点：入力を感知するたびに、リストだけを絞り込むように変更
        stopInput.addEventListener("input", () => {
            const val = stopInput.value.trim().toLowerCase();
            stopResults.innerHTML = "";
            if(!val) return;

            const matched = allStops.filter(s => s.name.toLowerCase().includes(val)).slice(0, 5);
            if(matched.length === 0){
                stopResults.innerHTML = `<div class="text-xs text-slate-400 p-1">あてはまるバス停がありません</div>`;
                return;
            }

            matched.forEach(s => {
                const div = document.createElement("div");
                div.className = "p-2 bg-slate-50 hover:bg-emerald-50 rounded-lg text-xs font-bold text-slate-600 cursor-pointer border border-slate-100 transition-colors";
                div.textContent = s.name;
                div.addEventListener("click", () => {
                    selectedStop = s;
                    stopInput.value = s.name; // 入力欄に確定した名前を入れる
                    stopResults.innerHTML = `
                        <div class="p-2 bg-emerald-100 text-emerald-800 font-bold rounded-lg text-xs border border-emerald-200">
                            ⭐ 設定完了: ${s.name}
                        </div>
                    `;
                });
                stopResults.appendChild(div);
            });
        });

        // 通知スタートボタンを押したとき
        notifyBtn.addEventListener("click", () => {
            if(!currentCompany || !selectedStop){
                alert("「バス会社」と「のるバス停」をえらんでからボタンを押してね！");
                return;
            }
            statusCard.classList.remove("hidden");
            statusText.innerHTML = `
                <strong>【お知らせスタート】</strong><br>
                ・バス会社: ${currentCompany.name}<br>
                ・バス停: ${selectedStop.name}<br>
                ・タイミング: バスの到着 ${timeRange.value} 分前<br><br>
                ※画面を閉じずにこのままお待ちください。バスの動きを見守っています！
            `;
        });
    </script>
</body>
</html>
