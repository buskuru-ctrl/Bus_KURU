<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バス接近通知 - Bus KURU</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1628;color:#e2e8f0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;min-height:100vh}
#app{max-width:430px;margin:0 auto;padding:14px}
.card{background:#1e293b;border-radius:14px;padding:16px;border:1px solid #334155;margin-bottom:14px}
.btn{border:none;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px}
.inp{background:#0a1628;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;width:100%}
input[type=range]{accent-color:#0ea5e9;width:100%}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes urgent{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 0 14px rgba(239,68,68,0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>
<body>
<div id="app"><div style="text-align:center;padding:60px 20px;color:#475569">
<div style="font-size:48px;margin-bottom:16px">🚌</div>
<div>読み込み中…</div>
</div></div>
<script>
var WORKER="https://cold-recipe-799d.kikucchao.workers.dev";
var S={screen:"welcome",route:null,targetIdx:0,gtfsUrl:null,realtimeId:null,allStops:[],stopFilter:"",searchQuery:"",searchResults:[],loadMsg:"",loadError:"",notifyMode:"stops",notifyStops:2,notifyMins:5,banner:null,notifiedIds:[],nowMin:0,showSettings:false,realtimeVehicles:[],realtimeDelays:{},realtimeError:"",lastUpdate:0,manualName:"",manualStops:"",manualTimes:"",manualInterval:"3"};
function getNow(){var n=new Date();return n.getHours()*60+n.getMinutes()+n.getSeconds()/60;}
S.nowMin=getNow();
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function parseTime(s){if(!s)return 0;var p=s.split(":");return+p[0]*60+(+p[1])+(p[2]?+p[2]/60:0);}
function fmtTime(m){var h=Math.floor(m/60)%24,mn=Math.round(m%60);return(h<10?"0":"")+h+":"+(mn<10?"0":"")+mn;}
function saveC(c){try{localStorage.setItem("bk5",JSON.stringify(c));}catch(e){}}
function loadC(){try{var s=localStorage.getItem("bk5");return s?JSON.parse(s):null;}catch(e){return null;}}
function parseCSV(text){
  if(!text)return[];
  var lines=text.trim().split("\n");
  if(lines.length<2)return[];
  var hdr=lines[0].replace(/\r/g,"").split(",").map(function(h){return h.trim().replace(/^"|"$/g,"");});
  return lines.slice(1).filter(function(l){return l.trim();}).map(function(line){
    var vals=[],cur="",q=false,chars=line.replace(/\r/g,"").split("");
    for(var i=0;i<chars.length;i++){var c=chars[i];if(c==='"'){q=!q;}else if(c===","&&!q){vals.push(cur.trim());cur="";}else{cur+=c;}}
    vals.push(cur.trim());
    var o={};hdr.forEach(function(h,i){o[h]=vals[i]||"";});return o;
  });
}
function buildRoute(files,sid){
  var stops=parseCSV(files["stops.txt"]),st=parseCSV(files["stop_times.txt"]),trips=parseCSV(files["trips.txt"]),routes=parseCSV(files["routes.txt"]);
  var tids=[];st.forEach(function(r){if(r.stop_id===sid&&tids.indexOf(r.trip_id)<0)tids.push(r.trip_id);});
  if(!tids.length)return null;
  var tid=tids[0];
  var ts=st.filter(function(r){return r.trip_id===tid;}).sort(function(a,b){return+a.stop_sequence-+b.stop_sequence;});
  var stopList=ts.map(function(r){var s=stops.filter(function(x){return x.stop_id===r.stop_id;})[0];return{id:r.stop_id,name:s?s.stop_name:r.stop_id};});
  var scheds=tids.slice(0,50).map(function(t){var a=st.filter(function(r){return r.trip_id===t;}).sort(function(a,b){return+a.stop_sequence-+b.stop_sequence;});return a[0]?(a[0].departure_time||a[0].arrival_time):null;}).filter(Boolean).sort();
  var rid=(trips.filter(function(t){return t.trip_id===tid;})[0]||{}).route_id;
  var rr=routes.filter(function(r){return r.route_id===rid;})[0]||{};
  var tidMap={};tids.forEach(function(t){var a=st.filter(function(r){return r.trip_id===t;}).sort(function(a,b){return+a.stop_sequence-+b.stop_sequence;});if(a[0])tidMap[t]=a[0].departure_time||a[0].arrival_time;});
  return{routeName:rr.route_long_name||rr.route_short_name||"路線",stopList:stopList,schedules:scheds,tripIdMap:tidMap};
}
function calcTimes(dep,n,iv){var b=parseTime(dep),a=[];for(var i=0;i<n;i++)a.push(b+i*iv);return a;}
function getPos(times,now){for(var i=0;i<times.length;i++){if(now<times[i]){var p=i===0?0:(now-times[i-1])/(times[i]-times[i-1]);return Math.max(0,i-1+Math.min(1,p));}}return times.length-1;}
function getBuses(){
  if(!S.route)return[];
  var iv=S.route.intervalMinutes||3.5,now=S.nowMin;
  if(S.realtimeId&&S.realtimeVehicles.length>0&&S.route.tripIdMap){
    var rb=[];
    S.realtimeVehicles.forEach(function(v){
      if(!v.tripId||!S.route.tripIdMap[v.tripId])return;
      var dep=S.route.tripIdMap[v.tripId],delay=(S.realtimeDelays[v.tripId]||0)/60;
      var times=calcTimes(dep,S.route.stops.length,iv).map(function(t){return t+delay;});
      var mtt=times[S.targetIdx]-now;
      if(mtt<-5||mtt>120)return;
      rb.push({id:"rt-"+v.tripId,times:times,posFloat:getPos(times,now),minsToTarget:mtt,delay:delay,isRealtime:true});
    });
    if(rb.length>0){rb.sort(function(a,b){return a.minsToTarget-b.minsToTarget;});return rb;}
  }
  return S.route.schedules.map(function(dep,i){
    var times=calcTimes(dep,S.route.stops.length,iv);
    return{id:"b"+i,times:times,posFloat:getPos(times,now),minsToTarget:times[S.targetIdx]-now,depMin:parseTime(dep),delay:0,isRealtime:false};
  }).filter(function(b){return now>=(b.depMin||0)&&b.times[S.targetIdx]>=now-1;});
}
var rtTimer=null;
function startRT(){if(rtTimer)clearInterval(rtTimer);doRT();rtTimer=setInterval(doRT,30000);}
function doRT(){
  if(!S.realtimeId)return;
  fetch(WORKER+"/?action=realtime&id="+S.realtimeId).then(function(r){return r.json();}).then(function(d){
    if(!d.error){S.realtimeVehicles=d.vehicles||[];S.realtimeDelays=d.delays||{};S.realtimeError="";S.lastUpdate=Date.now();}
    else S.realtimeError=d.error;
    checkNotify();if(S.screen==="monitor")render();
  }).catch(function(e){S.realtimeError=e.message;});
}
setInterval(function(){S.nowMin=getNow();checkNotify();if(S.screen==="monitor")render();},30000);
function checkNotify(){
  if(S.screen!=="monitor"||!S.route)return;
  getBuses().forEach(function(bus){
    if(S.notifiedIds.indexOf(bus.id)>=0)return;
    var fire=false,msg="";
    if(S.notifyMode==="stops"){var at=S.targetIdx-S.notifyStops;if(at>=0&&bus.posFloat>=at&&bus.posFloat<at+1.2){fire=true;msg="バスが"+S.notifyStops+"つ前「"+(S.route.stops[at]?S.route.stops[at].name:"")+"」に来ました！"+(bus.delay>0.5?"（"+Math.round(bus.delay)+"分遅れ）":"")+"準備して🏃";}}
    else{if(bus.minsToTarget<=S.notifyMins&&bus.minsToTarget>0){fire=true;msg="バスがあと約"+Math.ceil(bus.minsToTarget)+"分で来ます！"+(bus.delay>0.5?"（"+Math.round(bus.delay)+"分遅れ）":"")+"準備して🏃";}}
    if(fire){S.notifiedIds.push(bus.id);S.banner=msg;if(window.Notification&&Notification.permission==="granted")new Notification("🚌",{body:msg});render();}
  });
}
function handleSearch(){
  if(!S.searchQuery.trim())return;
  S.loadError="";S.searchResults=[];S.loadMsg="検索中…";render();
  fetch(WORKER+"/?action=search&q="+encodeURIComponent(S.searchQuery)).then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error);
    S.searchResults=d.results||[];S.loadMsg=d.results&&d.results.length?"":"見つかりませんでした";render();
  }).catch(function(e){S.loadError=e.message;S.loadMsg="";render();});
}
function selectCompany(i){
  var co=S.searchResults[i];
  S.loadError="";S.searchResults=[];S.screen="loading";S.loadMsg="時刻表を探しています…";render();
  var p;
  if(co.source==="known"){p=fetch(WORKER+"/?action=find_zip&id="+co.id).then(function(r){return r.json();}).then(function(d){if(d.error)throw new Error(d.error);S.realtimeId=d.hasRealtime?co.id:null;return d.latestUrl;});}
  else{S.realtimeId=null;p=Promise.resolve(co.gtfsUrl);}
  p.then(function(url){if(!url)throw new Error("URLなし");S.gtfsUrl=url;S.loadMsg="停留所を読み込み中…";render();return fetch(WORKER+"/?action=fetch_stops&url="+encodeURIComponent(url));})
  .then(function(r){return r.json();}).then(function(d){if(d.error)throw new Error(d.error);S.allStops=parseCSV(d.files["stops.txt"]);S.stopFilter="";S.loadMsg="";S.screen="stop_select";render();})
  .catch(function(e){S.loadError=e.message;S.loadMsg="";S.screen="welcome";render();});
}
function selectStop(sid){
  S.screen="loading";S.loadMsg="時刻表を読み込み中…";render();
  fetch(WORKER+"/?action=fetch_route&url="+encodeURIComponent(S.gtfsUrl)+"&stop_id="+encodeURIComponent(sid))
  .then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error);
    var res=buildRoute(d.files,sid);if(!res)throw new Error("便が見つかりません");
    var ns=res.stopList.map(function(s){return{id:s.id,name:s.name};});
    var ni=0;for(var i=0;i<res.stopList.length;i++){if(res.stopList[i].id===sid){ni=i;break;}}
    var nr={name:res.routeName,stops:ns,schedules:res.schedules,intervalMinutes:3,tripIdMap:res.tripIdMap};
    saveC({route:nr,targetIdx:ni,gtfsUrl:S.gtfsUrl,realtimeId:S.realtimeId,notifyMode:S.notifyMode,notifyStops:S.notifyStops,notifyMins:S.notifyMins});
    S.route=nr;S.targetIdx=ni;S.notifiedIds=[];S.screen="monitor";
    if(S.realtimeId)startRT();render();
  }).catch(function(e){S.loadError=e.message;S.screen="stop_select";render();});
}
function applyManual(){
  var stops=S.manualStops.split("\n").map(function(s){return s.trim();}).filter(Boolean).map(function(n,i){return{id:"m"+i,name:n};});
  var scheds=S.manualTimes.split("\n").map(function(s){return s.trim();}).filter(function(s){return/^\d{1,2}:\d{2}$/.test(s);});
  if(stops.length<2){alert("停留所を2つ以上入力してください");return;}
  if(!scheds.length){alert("時刻表を入力してください");return;}
  var nr={name:S.manualName||"手動入力路線",stops:stops,schedules:scheds,intervalMinutes:parseFloat(S.manualInterval)||3};
  saveC({route:nr,targetIdx:stops.length-1,notifyMode:S.notifyMode,notifyStops:S.notifyStops,notifyMins:S.notifyMins});
  S.route=nr;S.targetIdx=stops.length-1;S.notifiedIds=[];S.realtimeId=null;S.screen="monitor";render();
}
function renderStopList(){
  var el=document.getElementById("sl");if(!el)return;
  var f=S.stopFilter,shown=(f?S.allStops.filter(function(s){return(s.stop_name&&s.stop_name.indexOf(f)>=0)||(s.stop_id&&s.stop_id.indexOf(f)>=0);}):S.allStops).slice(0,200);
  var h='<div style="background:#1e293b;border-radius:14px;border:1px solid #334155;overflow:hidden">';
  if(!shown.length)h+='<div style="padding:20px;text-align:center;color:#475569;font-size:13px">該当なし</div>';
  shown.forEach(function(s,i){h+='<div onclick="selectStop(\''+esc(s.stop_id)+'\')" style="padding:13px 16px;border-bottom:'+(i<shown.length-1?"1px solid #1e3a5f":"none")+';cursor:pointer;display:flex;align-items:center;gap:10px"><div style="font-size:18px">🚏</div><div style="flex:1"><div style="font-size:15px;color:#e2e8f0">'+esc(s.stop_name)+'</div><div style="font-size:11px;color:#475569">'+esc(s.stop_id)+'</div></div><div style="color:#475569">›</div></div>';});
  h+='</div><div style="font-size:11px;color:#1e3a5f;text-align:center;margin-top:8px">'+(shown.length<200?shown.length+"件":"上位200件")+'</div>';
  el.innerHTML=h;
}
function render(){
  var app=document.getElementById("app"),html="",buses=getBuses(),next=null;
  for(var i=0;i<buses.length;i++){if(buses[i].minsToTarget>0){next=buses[i];break;}}
  var mins=next?Math.ceil(next.minsToTarget):null,urgent=mins!==null&&mins<=3;
  var nai=S.notifyMode==="stops"?Math.max(0,S.targetIdx-S.notifyStops):null;
  if(S.banner){html+='<div style="position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:200;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:white;padding:12px 16px;border-radius:14px;box-shadow:0 8px 24px rgba(14,165,233,0.5);max-width:90vw;display:flex;align-items:center;gap:10px"><span style="font-size:20px">🔔</span><span style="font-size:13px;font-weight:600;flex:1">'+esc(S.banner)+'</span><button onclick="S.banner=null;render()" style="background:rgba(255,255,255,0.2);border:none;color:white;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:12px">✕</button></div>';}
  if(S.screen==="loading"){app.innerHTML='<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center"><div style="font-size:48px;margin-bottom:20px">🚌</div><div style="font-size:15px;color:#94a3b8;margin-bottom:16px">'+esc(S.loadMsg)+'</div><button onclick="S.screen=\'welcome\';S.loadMsg=\'\';S.loadError=\'\';render()" class="btn" style="background:#1e293b;padding:10px 20px;color:#64748b">キャンセル</button></div>';return;}
  if(S.screen==="welcome"){
    var h2='<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">'
    +'<div style="text-align:center;margin-bottom:28px"><div style="font-size:52px;margin-bottom:12px;animation:float 2.5s ease-in-out infinite">🚌</div>'
    +'<div style="font-size:22px;font-weight:800;margin-bottom:6px">バス接近通知</div>'
    +'<div style="font-size:13px;color:#475569;line-height:1.8">バス会社名を入力するだけで<br>リアルタイム位置情報を取得します</div></div>'
    +'<div style="width:100%;max-width:380px">'
    +'<div style="display:flex;gap:8px;margin-bottom:12px">'
    +'<input id="sq" type="text" class="inp" placeholder="バス会社名（例：十勝バス）" value="'+esc(S.searchQuery)+'" style="flex:1;border-radius:12px;padding:12px 14px;font-size:15px">'
    +'<button onclick="S.searchQuery=document.getElementById(\'sq\').value;handleSearch()" class="btn" style="padding:12px 16px;background:#0ea5e9;color:white;font-size:15px;flex-shrink:0">検索</button>'
    +'</div>';
    if(S.loadError)h2+='<div style="background:#450a0a;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#f87171">'+esc(S.loadError)+'</div>';
    if(S.loadMsg)h2+='<div style="text-align:center;color:#475569;font-size:13px;margin-bottom:8px">'+esc(S.loadMsg)+'</div>';
    if(S.searchResults.length){
      h2+='<div style="background:#1e293b;border-radius:14px;border:1px solid #334155;overflow:hidden;margin-bottom:12px"><div style="font-size:11px;color:#475569;padding:10px 14px 6px">'+S.searchResults.length+'件</div>';
      S.searchResults.forEach(function(co,i){h2+='<div onclick="selectCompany('+i+')" style="padding:14px;border-top:1px solid #1e3a5f;cursor:pointer;display:flex;align-items:center;gap:10px"><div style="font-size:20px">🚌</div><div style="flex:1"><div style="font-size:15px;font-weight:600">'+esc(co.name)+'</div><div style="font-size:11px;color:#475569;margin-top:2px">'+(co.hasRealtime?'<span style="color:#22c55e">● リアルタイム対応</span>':'時刻表のみ')+'</div></div><div style="color:#475569">›</div></div>';});
      h2+='</div>';
    }
    h2+='<div style="text-align:center"><button onclick="S.screen=\'manual\';render()" style="background:none;border:none;color:#334155;font-size:13px;cursor:pointer;text-decoration:underline">手動で入力する</button></div></div></div>';
    app.innerHTML=h2;
    var sq=document.getElementById("sq");if(sq)sq.onkeydown=function(e){if(e.key==="Enter"){S.searchQuery=sq.value;handleSearch();}};
    return;
  }
  if(S.screen==="stop_select"){
    if(!document.getElementById("sl")){
      app.innerHTML='<div style="background:linear-gradient(135deg,#0ea5e9,#6366f1);padding:24px 16px 16px;margin:-14px -14px 14px"><button onclick="S.screen=\'welcome\';render()" style="background:rgba(255,255,255,0.15);border:none;border-radius:8px;color:white;padding:6px 12px;font-size:13px;cursor:pointer;margin-bottom:12px;display:block">← 戻る</button><div style="font-size:18px;font-weight:800">乗る停留所を選んでください</div><div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:4px">一度設定すれば次回から自動起動します</div></div>'
      +'<div class="card"><input id="sf" type="text" class="inp" placeholder="🔍 停留所名で絞り込み…"></div>'
      +'<div id="sl"></div>';
      var sf=document.getElementById("sf");if(sf)sf.addEventListener("input",function(e){S.stopFilter=e.target.value;renderStopList();});
    }
    renderStopList();return;
  }
  if(S.screen==="manual"){
    app.innerHTML='<button onclick="S.screen=\'welcome\';render()" style="background:#1e293b;border:1px solid #334155;border-radius:8px;color:#64748b;padding:6px 12px;font-size:13px;cursor:pointer;margin-bottom:14px;display:block">← 戻る</button>'
    +'<div style="font-size:16px;font-weight:700;margin-bottom:14px">✏️ 手動入力</div>'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:4px">路線名</div><input id="mn" type="text" class="inp" value="'+esc(S.manualName)+'" placeholder="例: ○○バス 駅前線" style="margin-bottom:12px">'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:4px">停留所（1行に1つ、始発から）</div><textarea id="ms" class="inp" rows="5" style="margin-bottom:12px;resize:vertical">'+esc(S.manualStops)+'</textarea>'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:4px">出発時刻（1行に1つ）</div><textarea id="mt" class="inp" rows="4" style="margin-bottom:12px;resize:vertical">'+esc(S.manualTimes)+'</textarea>'
    +'<div style="font-size:12px;color:#64748b;margin-bottom:4px">停留所間の平均時間（分）</div><input id="mi" type="text" class="inp" value="'+esc(S.manualInterval)+'" style="margin-bottom:16px">'
    +'<button onclick="S.manualName=document.getElementById(\'mn\').value;S.manualStops=document.getElementById(\'ms\').value;S.manualTimes=document.getElementById(\'mt\').value;S.manualInterval=document.getElementById(\'mi\').value;applyManual()" class="btn" style="width:100%;padding:13px;background:linear-gradient(135deg,#059669,#0891b2);color:white;font-size:15px">✅ 設定する</button>';
    return;
  }
  if(!S.route){app.innerHTML="";return;}
  var pos0=buses[0]?buses[0].posFloat:-1;
  var rtInfo="";
  if(S.realtimeId){var sa=S.lastUpdate?Math.round((Date.now()-S.lastUpdate)/1000):null;rtInfo=S.realtimeError?'<span style="color:#ef4444;font-size:10px">● エラー</span>':sa!==null?'<span style="color:#22c55e;font-size:10px;animation:pulse 2s infinite">● リアルタイム '+(sa<60?sa+"秒前":Math.round(sa/60)+"分前")+'</span>':'<span style="color:#475569;font-size:10px">● 取得中</span>';}
  html+='<div style="background:linear-gradient(180deg,#0f1f3d,#0a1628);padding:14px 14px 0;margin:-14px -14px 14px;border-bottom:1px solid #0f1f3d">'
  +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'
  +'<span style="font-size:22px;animation:float 2.5s ease-in-out infinite">🚌</span>'
  +'<div style="flex:1"><div style="font-size:15px;font-weight:700">バス接近通知</div>'
  +'<div style="font-size:11px;color:#334155;margin-top:2px;display:flex;gap:6px;align-items:center"><span style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(S.route.name)+'</span>'+rtInfo+'</div></div>'
  +'<div style="font-size:22px;font-weight:800;color:#38bdf8;font-variant-numeric:tabular-nums">'+fmtTime(S.nowMin)+'</div>'
  +'</div></div>';
